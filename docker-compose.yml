version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: projects_db
    environment:
      POSTGRES_USER: ${DB_USER:-projects_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-projects_password}
      POSTGRES_DB: ${DB_NAME:-projects_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-projects_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: projects_backend
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-projects_user}:${DB_PASSWORD:-projects_password}@db:5432/${DB_NAME:-projects_db}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      PYTHONPATH: /app
      PROJECTS_ROOT: ${PROJECTS_ROOT:-/mnt/projects}
      NAS_ROOT: ${NAS_ROOT:-/volume1/Projects}
      # Auth — override all three before exposing the app externally.
      # Generate a key: python -c "import secrets; print(secrets.token_hex(32))"
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      TOKEN_EXPIRE_HOURS: ${TOKEN_EXPIRE_HOURS:-8}
    volumes:
      - ./sample_projects:/mnt/projects:ro
    depends_on:
      db:
        condition: service_healthy
    # Runs migrations on every start (alembic upgrade is idempotent), then
    # launches the API server.  Override with COMMAND env var if needed.
    command: >-
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  # Frontend (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Set ADMIN_ROUTE in .env to a hard-to-guess path (e.g. a short GUID).
        # This is baked into the frontend bundle at build time.
        VITE_ADMIN_ROUTE: ${ADMIN_ROUTE:-/admin-5e8a2b9f4c1d}
    container_name: projects_frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
