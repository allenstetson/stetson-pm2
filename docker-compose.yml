version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: projects_db
    environment:
      POSTGRES_USER: ${DB_USER:-projects_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-projects_password}
      POSTGRES_DB: ${DB_NAME:-projects_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-projects_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: projects_backend
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-projects_user}:${DB_PASSWORD:-projects_password}@db:5432/${DB_NAME:-projects_db}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      PYTHONPATH: /app
      # Mount ./sample_projects (or a real NAS share) to /mnt/projects.
      # Swap the volume below or set PROJECTS_ROOT to a different path for production.
      PROJECTS_ROOT: ${PROJECTS_ROOT:-/mnt/projects}
      NAS_ROOT: ${NAS_ROOT:-/volume1/Projects}
    volumes:
      - ./sample_projects:/mnt/projects:ro
    depends_on:
      db:
        condition: service_healthy
    # Runs migrations on every start (alembic upgrade is idempotent), then
    # launches the API server.  Override with COMMAND env var if needed.
    command: >-
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  # Frontend (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: projects_frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
