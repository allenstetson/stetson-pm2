# A generic, single database configuration.

[alembic]
# Path to migration scripts, relative to this file's location.
script_location = alembic

# Prepend sys.path with the directory containing this file so that
# "from app.xxx import yyy" imports resolve when running alembic from
# inside the backend/ directory.
prepend_sys_path = .

# Template used to generate migration file names:
file_template = %%(rev)s_%%(slug)s

# Timezone for the "Create Date" comment in generated files.
timezone = UTC

# The SQLAlchemy URL is set dynamically in alembic/env.py from the
# DATABASE_URL environment variable.  This placeholder is required by
# alembic.ini syntax but is overridden at runtime.
sqlalchemy.url = postgresql://projects_user:projects_password@localhost:5432/projects_db


# ------ logging configuration ------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
